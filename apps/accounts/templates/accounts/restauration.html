{% extends 'base.html' %} {% load static %} {% block title %}Mot de passe oublié
– StockMaster{% endblock %} {% block content %}
<div
  class="max-w-md mx-auto bg-white border border-gray-200 rounded-2xl p-8 shadow-sm"
>
  <i class="fas fa-key text-orange-500 text-3xl mb-4 block text-center"></i>
  <h2 class="text-2xl font-bold text-center text-gray-900">
    Mot de passe oublié ?
  </h2>
  <p class="text-center text-gray-500 text-sm mt-2 mb-6">
    Saisissez votre email, nous vous enverrons un lien de réinitialisation.
  </p>
  <form method="post">
    {% csrf_token %}
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700"
        >Email professionnel</label
      >
      <input
        type="email"
        name="email"
        class="mt-1 w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-orange-500 focus:border-orange-500"
        placeholder="nom@entreprise.fr"
      />
    </div>
    <button
      type="submit"
      class="w-full bg-orange-500 text-white py-3 rounded-lg font-semibold hover:bg-orange-600 transition"
    >
      Envoyer le lien
    </button>
  </form>
  <p class="text-center text-xs text-gray-400 mt-6">
    <a href="{% url 'accounts:connexion' %}" class="text-orange-500"
      >Retour à la connexion</a
    >
  </p>
</div>
{% endblock %}
