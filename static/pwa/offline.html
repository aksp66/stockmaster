<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockMaster – Hors ligne</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background: #f8f7f4;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        text-align: center;
        max-width: 400px;
        background: white;
        border-radius: 28px;
        padding: 32px 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        border: 1px solid #ffe4cc;
      }
      .icon {
        width: 72px;
        height: 72px;
        background: #fff0e6;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }
      .icon i {
        font-size: 36px;
        color: #f97316;
      }
      h1 {
        font-size: 24px;
        font-weight: 700;
        color: #1f2937;
        margin-bottom: 8px;
      }
      p {
        color: #6b7280;
        line-height: 1.5;
        margin-bottom: 24px;
      }
      .btn {
        display: inline-block;
        background: #f97316;
        color: white;
        text-decoration: none;
        padding: 10px 24px;
        border-radius: 999px;
        font-weight: 600;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #ea580c;
      }
      .try-again {
        margin-top: 16px;
        font-size: 14px;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <!-- Font Awesome offline fallback (simple emoji) -->
        <span style="font-size: 36px">📡</span>
      </div>
      <h1>Vous êtes hors ligne</h1>
      <p>
        Vérifiez votre connexion internet.<br />Les fonctionnalités de scan et
        les mouvements seront synchronisés automatiquement au retour de la
        connexion.
      </p>
      <a href="javascript:location.reload()" class="btn">⟳ Réessayer</a>
      <div class="try-again">Ou revenez plus tard</div>
    </div>
  </body>
</html>
