<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>500 – Erreur serveur | StockMaster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      body {
        font-family: "Sora", sans-serif;
        background: #f8f7f4;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .code {
        font-family: "JetBrains Mono", monospace;
      }
      @keyframes shake {
        0%,
        100% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(-3deg);
        }
        75% {
          transform: rotate(3deg);
        }
      }
      .shake {
        animation: shake 1.5s ease-in-out infinite;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .au {
        animation: fadeUp 0.4s ease forwards;
      }
      .au-1 {
        animation-delay: 0.08s;
        opacity: 0;
      }
      .au-2 {
        animation-delay: 0.16s;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      style="position: fixed; inset: 0; overflow: hidden; pointer-events: none"
    >
      <div
        style="
          position: absolute;
          top: -100px;
          right: -100px;
          width: 450px;
          height: 450px;
          border-radius: 50%;
          background: rgba(239, 68, 68, 0.04);
        "
      ></div>
      <div
        style="
          position: absolute;
          bottom: -80px;
          left: -80px;
          width: 350px;
          height: 350px;
          border-radius: 50%;
          background: rgba(239, 68, 68, 0.03);
        "
      ></div>
    </div>
    <div
      style="
        text-align: center;
        padding: 40px 24px;
        position: relative;
        max-width: 520px;
      "
    >
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
          margin-bottom: 48px;
        "
        class="au"
      >
        <div
          style="
            width: 34px;
            height: 34px;
            background: #f97316;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.35);
          "
        >
          <i
            class="fas fa-layer-group"
            style="color: white; font-size: 14px"
          ></i>
        </div>
        <span style="font-size: 18px; font-weight: 800"
          >Stock<span style="color: #f97316">Master</span></span
        >
      </div>
      <div class="shake" style="margin-bottom: 32px">
        <div
          style="
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fef2f2, #fecaca);
            border: 2px solid #fca5a5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
          "
        >
          <i class="fas fa-server" style="font-size: 48px; color: #dc2626"></i>
        </div>
      </div>
      <div
        class="code au"
        style="
          font-size: 64px;
          font-weight: 800;
          color: #dc2626;
          line-height: 1;
          margin-bottom: 12px;
        "
      >
        500
      </div>
      <h1
        class="au au-1"
        style="
          font-size: 22px;
          font-weight: 700;
          color: #111827;
          margin-bottom: 10px;
        "
      >
        Erreur interne du serveur
      </h1>
      <p
        class="au au-1"
        style="
          font-size: 14px;
          color: #6b7280;
          line-height: 1.7;
          margin-bottom: 32px;
        "
      >
        Une erreur inattendue s'est produite côté serveur.<br />
        Notre équipe a été notifiée et travaille à résoudre le problème.
      </p>
      <div
        class="au au-2"
        style="
          display: flex;
          gap: 10px;
          justify-content: center;
          flex-wrap: wrap;
        "
      >
        <a
          href="javascript:location.reload()"
          style="
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 20px;
            border-radius: 9px;
            border: 1.5px solid #e5e7eb;
            background: white;
            color: #374151;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
          "
        >
          <i class="fas fa-rotate-right"></i> Réessayer
        </a>
        <a
          href="{% url 'pages:accueil' %}"
          style="
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 20px;
            border-radius: 9px;
            background: #f97316;
            color: white;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            box-shadow: 0 2px 10px rgba(249, 115, 22, 0.3);
          "
        >
          <i class="fas fa-house"></i> Accueil
        </a>
        <a
          href="https://wa.me/22891123080"
          target="_blank"
          style="
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 20px;
            border-radius: 9px;
            background: #25d366;
            color: white;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
          "
        >
          <i class="fab fa-whatsapp"></i> Contacter le support
        </a>
      </div>
    </div>
  </body>
</html>
