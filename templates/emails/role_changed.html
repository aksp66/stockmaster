<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Changement de rôle</title>
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 20px;
      }
      .container {
        max-width: 560px;
        margin: 0 auto;
        background: white;
        border-radius: 16px;
        overflow: hidden;
      }
      .header {
        background: #f97316;
        padding: 24px;
        text-align: center;
        color: white;
      }
      .content {
        padding: 32px;
      }
      .footer {
        background: #f9fafb;
        padding: 16px;
        text-align: center;
        font-size: 12px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>StockMaster</h1>
      </div>
      <div class="content">
        <h2>Bonjour {{ first_name }},</h2>
        <p>
          Votre rôle au sein de l'entreprise <strong>{{ entreprise }}</strong> a
          été modifié.
        </p>
        <p>Votre nouveau rôle est : <strong>{{ nouveau_role }}</strong>.</p>
        <p>
          Si vous pensez qu'il s'agit d'une erreur, veuillez contacter
          l'administrateur de votre entreprise.
        </p>
      </div>
      <div class="footer">&copy; 2026 StockMaster</div>
    </div>
  </body>
</html>
